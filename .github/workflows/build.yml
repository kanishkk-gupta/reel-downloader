name: Build Reel Downloader APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential git zip unzip libffi-dev libssl-dev \
            cmake autoconf libtool pkg-config zlib1g-dev

      - name: Force Java 17
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/temurin-17-jdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/temurin-17-jdk-amd64/bin" >> $GITHUB_PATH

      - name: Wire system Android SDK into Buildozer path
        run: |
          SYSTEM_SDK="/usr/local/lib/android/sdk"
          BSDK="$HOME/.buildozer/android/platform/android-sdk"

          # Point Buildozer to the pre-installed SDK (no download needed)
          mkdir -p "$(dirname "$BSDK")"
          ln -sfn "$SYSTEM_SDK" "$BSDK"

          # Create the legacy tools/bin/sdkmanager wrapper Buildozer looks for
          mkdir -p "$SYSTEM_SDK/tools/bin"
          REAL_SM=$(find "$SYSTEM_SDK/cmdline-tools" -name "sdkmanager" -type f 2>/dev/null | head -1)
          echo "#!/bin/bash" > "$SYSTEM_SDK/tools/bin/sdkmanager"
          echo "exec \"$REAL_SM\" \"\$@\"" >> "$SYSTEM_SDK/tools/bin/sdkmanager"
          chmod +x "$SYSTEM_SDK/tools/bin/sdkmanager"

          # Verify Java 17 + sdkmanager work together
          java -version
          "$SYSTEM_SDK/tools/bin/sdkmanager" --version

      - name: Accept SDK licenses
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        run: |
          SYSTEM_SDK="/usr/local/lib/android/sdk"
          mkdir -p "$SYSTEM_SDK/licenses"
          printf "24333f8a63b6825ea9c5514f83c2829b004d1fee\n8933bad161af4178b1185d1a37fbf41ea5269c55\n" \
            > "$SYSTEM_SDK/licenses/android-sdk-license"
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n" \
            > "$SYSTEM_SDK/licenses/android-sdk-preview-license"

          yes | "$SYSTEM_SDK/tools/bin/sdkmanager" \
            "platforms;android-34" "build-tools;34.0.0" \
            --sdk_root="$SYSTEM_SDK" 2>/dev/null || true

      - name: Wire system NDK into Buildozer path
        run: |
          SYSTEM_SDK="/usr/local/lib/android/sdk"
          BPLATFORM="$HOME/.buildozer/android/platform"

          # Buildozer looks for android-ndk-r25b; link system NDK 27 there
          NDK_PATH=$(ls -d "$SYSTEM_SDK/ndk/"* 2>/dev/null | sort | tail -1)
          echo "System NDK: $NDK_PATH"
          ln -sfn "$NDK_PATH" "$BPLATFORM/android-ndk-r25b"

      - name: Install Buildozer + Cython
        run: pip install buildozer==1.5.0 cython==0.29.33

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        run: buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ReelDownloader-APK
          path: bin/*.apk
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
