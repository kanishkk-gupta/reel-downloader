name: Build Reel Downloader APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            zip \
            unzip \
            libffi-dev \
            libssl-dev \
            python3-setuptools \
            libglib2.0-dev \
            libpango1.0-dev \
            libcairo2-dev \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.33

      - name: Accept Android SDK licenses
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > $HOME/.buildozer/android/platform/android-sdk/licenses/intel-android-extra-license
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > $HOME/.buildozer/android/platform/android-sdk/licenses/google-gdk-license

      - name: Build APK
        run: |
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          buildozer -v android debug 2>&1 | tee build.log
        continue-on-error: true

      - name: Find APK
        run: |
          find . -name "*.apk" 2>/dev/null || echo "No APK found, check build.log"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReelDownloader-APK
          path: bin/*.apk
          if-no-files-found: warn

      - name: Upload build log on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
